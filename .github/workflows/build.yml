name: build
permissions:
  contents: read

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'Docs/**'       # Docs folder in root of repo
      - '**/*.md'       # .md files anywhere in the repo
      - '**/LICENSE'    # LICENSE files anywhere in the repo
      - '**/.gitignore' # .gitignore files anywhere in the repo
      
  pull_request:
    branches: [main]
    paths-ignore:
      - 'Docs/**'       # Docs folder in root of repo
      - '**/*.md'       # .md files anywhere in the repo
      - '**/LICENSE'    # LICENSE files anywhere in the repo
      - '**/.gitignore' # .gitignore files anywhere in the repo
      
  workflow_dispatch:
    
  schedule:
  - cron: '40 12 * * *'   # once a day @ 12:40pm UTC (5:40am PST)

env:
  SCHEME: swift-testing-extensions
  WORKSPACEPATH: .swiftpm/xcode/package.xcworkspace

jobs:
  macOS:
    name: Tests (macOS)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@main
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Build
      run: |
        PARAMS=(
          -skipMacroValidation
          -workspace "$WORKSPACEPATH"
          -scheme "$SCHEME"
          -destination "generic/platform=macOS"
        )
        xcodebuild build "${PARAMS[@]}" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
    - name: Unit Tests
      run: |
        PARAMS=(
          -skipMacroValidation
          -workspace "$WORKSPACEPATH"
          -scheme "$SCHEME"
          -destination "platform=macOS"
        )
        xcodebuild test "${PARAMS[@]}" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
  
  macCatalyst:
    name: Tests (macCatalyst)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@main
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Build
      run: |
        # As a workaround for flakey pre-builds included in SwiftSyntax, we have to disable them when testing any platform that isn't macOS
        # See: https://github.com/swiftlang/swift-syntax/issues/2421#issuecomment-3542406416
        PARAMS=(
          -skipMacroValidation
          -workspace "$WORKSPACEPATH"
          -scheme "$SCHEME"
          -destination "generic/platform=macOS,variant=Mac Catalyst"
          -IDEPackageEnablePrebuilts=NO
        )
        xcodebuild build "${PARAMS[@]}" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
    - name: Delete Derived Data
      run: rm -rf ~/Library/Developer/Xcode/DerivedData
    - name: Unit Tests
      run: |
        # As a workaround for flakey pre-builds included in SwiftSyntax, we have to disable them when testing any platform that isn't macOS
        # See: https://github.com/swiftlang/swift-syntax/issues/2421#issuecomment-3542406416
        PARAMS=(
          -skipMacroValidation
          -workspace "$WORKSPACEPATH"
          -scheme "$SCHEME"
          -destination "platform=macOS,variant=Mac Catalyst"
          -IDEPackageEnablePrebuilts=NO
        )
        xcodebuild test "${PARAMS[@]}" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
  
  device-simulators:
    name: Tests
    runs-on: macos-latest
    strategy:
      matrix:
        target: [iOS, tvOS, watchOS, visionOS]
    continue-on-error: true
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@main
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Prepare Device Simulator
      id: sim-setup
      uses: orchetect/setup-xcode-simulator@v1
      with:
        refresh: true
        download: true
        scheme: ${{ env.SCHEME }}
        target: ${{ matrix.target }}
    - name: Build
      run: |
        # As a workaround for flakey pre-builds included in SwiftSyntax, we have to disable them when testing any platform that isn't macOS
        # See: https://github.com/swiftlang/swift-syntax/issues/2421#issuecomment-3542406416
        PARAMS=(
          -skipMacroValidation
          -workspace "$WORKSPACEPATH"
          -scheme "$SCHEME"
          -destination "generic/platform=$PLATFORMSHORT"
          -IDEPackageEnablePrebuilts=NO
        )
        xcodebuild build "${PARAMS[@]}" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
      env:
        PLATFORMSHORT: ${{ steps.sim-setup.outputs.platform-short }}
        WORKSPACEPATH: ${{ steps.sim-setup.outputs.workspace-path }}
    - name: Delete Derived Data
      run: rm -rf ~/Library/Developer/Xcode/DerivedData
    - name: Unit Tests
      run: |
        # As a workaround for flakey pre-builds included in SwiftSyntax, we have to disable them when testing any platform that isn't macOS
        # See: https://github.com/swiftlang/swift-syntax/issues/2421#issuecomment-3542406416
        PARAMS=(
          -skipMacroValidation
          -workspace "$WORKSPACEPATH"
          -scheme "$SCHEME"
          -destination "platform=$PLATFORM,id=$ID"
          -IDEPackageEnablePrebuilts=NO
        )
        xcodebuild test "${PARAMS[@]}" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
      env:
        ID: ${{ steps.sim-setup.outputs.id }}
        PLATFORM: ${{ steps.sim-setup.outputs.platform }}
        WORKSPACEPATH: ${{ steps.sim-setup.outputs.workspace-path }}

  integration-tests:
    name: Integration Tests
    runs-on: macos-latest
    strategy:
      matrix:
        package: [TestWithoutResources, TestWithResources]
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@main
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Build
      env:
        PACKAGE: ${{ matrix.package }}
      run: |
        cd "Integration Tests/$PACKAGE"
        PARAMS=(
          -skipMacroValidation
          -workspace "$WORKSPACEPATH"
          -scheme "$PACKAGE"
          -destination "generic/platform=macOS"
        )
        xcodebuild build "${PARAMS[@]}" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}
    - name: Unit Tests
      env:
        PACKAGE: ${{ matrix.package }}
      run: |
        cd "Integration Tests/$PACKAGE"
        PARAMS=(
          -skipMacroValidation
          -workspace "$WORKSPACEPATH"
          -scheme "$PACKAGE"
          -destination "platform=macOS"
        )
        xcodebuild test "${PARAMS[@]}" | xcbeautify --renderer github-actions && exit ${PIPESTATUS[0]}

  linux:
    name: Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@main
    # As a workaround for flakey pre-builds included in SwiftSyntax, we have to disable them when testing any platform that isn't macOS
    # See: https://github.com/swiftlang/swift-syntax/issues/2421#issuecomment-3542406416
    - name: Build
      run: swift build --disable-experimental-prebuilts
    - name: Delete Build Folder
      run: rm -rf .build/
    - name: Unit Tests
      run: swift test --disable-experimental-prebuilts

  android:
    name: Build (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SDK_ID: swift-6.3-RELEASE_android
      SDK_URL: https://download.swift.org/swift-6.3-release/android-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_android.artifactbundle.tar.gz
      SDK_CHECKSUM: 2f2942c4bcea7965a08665206212c66991dabe23725aeec7c4365fc91acad088
      TARGET_TRIPLE: aarch64-unknown-linux-android28
    steps:
    - uses: actions/checkout@main
    # AFAIK, the SDK is not pre-installed on the runner images
    - name: Install Android SDK for Swift
      run: |
        swift sdk install "$SDK_URL" --checksum "$SDK_CHECKSUM"
    # Android NDK is pre-installed on runner image, we just need to run the SDK setup script to link it
    - name: Setup Android SDK for Swift
      run: |
        SDK_INFO=$(swift sdk configure --show-configuration "${SDK_ID}" "${TARGET_TRIPLE}")
        SDK_PATH_REGEX="m/sdkRootPath\:\s(\S*\/swift\-android)/g"
        SDK_PATH=$(echo "${SDK_INFO}" | perl -nle 'if ('$SDK_PATH_REGEX') { ($path) = ($1); print "${path}"; }')
        if [[ -z $SDK_PATH ]]; then echo "⛔️ Error: SDK Path not found."; exit 1; fi
        echo Android Swift SDK Path: "$SDK_PATH"
        cd "$SDK_PATH"
        ./scripts/setup-android-sdk.sh
    # As a workaround for flakey pre-builds included in SwiftSyntax, we have to disable them when testing any platform that isn't macOS
    # See: https://github.com/swiftlang/swift-syntax/issues/2421#issuecomment-3542406416
    - name: Build
      run: swift build --swift-sdk "$TARGET_TRIPLE" --static-swift-stdlib --disable-experimental-prebuilts
